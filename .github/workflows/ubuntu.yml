name: CI
on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Test (native)
        run: go test ./...

      - name: Install i686-linux-musl-gcc (cross)
        run: |
          set -eux
          curl -L https://musl.cc/i686-linux-musl-cross.tgz | tar -xz
          echo "$PWD/i686-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Build linux/386 (musl static with cgo)
        run: |
          mkdir -p dist
          CC=i686-linux-musl-gcc \
          CGO_ENABLED=1 GOOS=linux GOARCH=386 \
          go build -trimpath \
            -ldflags="-s -w -linkmode external -extldflags '-static'" \
            -o dist/chisel-linux-386-musl
          file dist/chisel-linux-386-musl
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: chisel-binaries
          path: dist/*
