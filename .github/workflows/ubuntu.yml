name: CI
on:
  push:
  workflow_dispatch:

jobs:
  build-linux-386-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Download i686-linux-musl cross toolchain
        run: |
          curl -L https://musl.cc/i686-linux-musl-cross.tgz | tar -xz
          echo "$PWD/i686-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Build static linux/386 with cgo
        run: |
          mkdir -p dist
          CC=i686-linux-musl-gcc \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=386 \
          go build \
            -ldflags="-s -w -linkmode external -extldflags '-static'" \
            -o dist/chisel-linux-386
          file dist/chisel-linux-386
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: chisel-linux-386
          path: dist/*
