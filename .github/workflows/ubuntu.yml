name: CI
on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: stable
          check-latest: true

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y musl-tools gcc-multilib

      - name: Run tests
        run: go test ./...

      - name: Build
        run: |
          CC=musl-gcc \
            CGO_ENABLED=1 \
            GOOS=linux \
            GOARCH=386 \
            go build \
              -ldflags="-s -w -linkmode external -extldflags '-static'" \
              -v .
          ls -al

      - uses: actions/upload-artifact@v4
        with:
          name: chisel
          path: ./*
