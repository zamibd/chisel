name: CI
on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["stable"]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Install musl cross toolchain for 386
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib musl-tools

      - name: Build Linux 386 static binary
        run: |
          CC="musl-gcc" \
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=386 \
          go build \
            -ldflags="-s -w -linkmode external -extldflags '-static'" \
            -v .
          ls -al

      - uses: actions/upload-artifact@v4
        with:
          name: chisel
          path: ./*
