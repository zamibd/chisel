name: CI
on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      # Run tests natively on the runner arch
      - name: Test (native)
        run: go test ./...

      # Cross-compile linux/386 without cgo
      - name: Build linux/386 (CGO disabled)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=386 \
            go build -trimpath -ldflags "-s -w" \
            -o dist/chisel-linux-386
          file dist/chisel-linux-386
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: chisel-binaries
          path: dist/*
